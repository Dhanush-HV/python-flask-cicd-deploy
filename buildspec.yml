version: 0.2

env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /myapp/docker_crediential/username
    DOCKER_REGISTRY_PASSWORD: /myapp/docker_crediential/password
    DOCKER_REGISTRY_URL: /myapp/docker_crediential/docker_registry_url

phases:
  install:
    runtime-versions:
      python: 3.11

  pre_build:
    commands:
      - echo "Installing dependencies..."
      - chmod +x script/install_dependencies.sh
      - ./script/install_dependencies.sh

  build:
    commands:
      - echo "Running build phase..."
      - pwd
      - ls -ltr
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin "$DOCKER_REGISTRY_URL"
      - docker build -t "$DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/python-app-sample2:latest" .
      - docker push "$DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/python-app-sample2:latest"
      - echo "Build completed"

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
